<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Center - Файлы</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Copy Center</h1>
            <p class="subtitle">Просмотр файлов из облачного хранилища</p>
        </header>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Загрузка файлов...</p>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="filesContainer" class="files-list hidden"></div>

        <div id="emptyState" class="empty-state hidden">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#bdc3c7" stroke-width="1.5">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <p>Файлы не найдены</p>
        </div>

        <div id="uploadSection" class="upload-section hidden">
            <input type="file" id="fileInput" multiple hidden accept=".doc,.docx,.pdf,.png,.jpg,.jpeg">
            <button id="uploadBtn" class="upload-btn">+ Добавить файлы</button>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
